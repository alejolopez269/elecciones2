  header { background: var(--verde); color: white; padding: 16px 20px; }

  .hstat-label { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }

  /* FILTERS */
  .filters { background: white; border: 1px solid var(--gris-borde); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; box-shadow: var(--sombra); }
  .filters label { font-size: 12px; font-weight: 600; color: var(--texto-suave); text-transform: uppercase; letter-spacing: 0.4px; }

  input[type="text"] { width: 180px; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .btn-clear { background: none; border: 1px solid var(--gris-borde); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--gris); cursor: pointer; margin-left: auto; }
  .btn-clear:hover { background: var(--gris-claro); }
  .results-count { font-size: 12px; color: var(--gris); margin-left: 4px; white-space: nowrap; }

  /* SECTION TITLES */
  .section-title { font-size: 15px; font-weight: 700; color: var(--texto); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-title span.pill { font-size: 11px; font-weight: 600; background: var(--gris-claro); color: var(--gris); padding: 2px 8px; border-radius: 20px; }

  .map-mode-btn { padding: 5px 12px; font-size: 12px; font-weight: 600; border: 1px solid var(--gris-borde); border-radius: 20px; background: white; cursor: pointer; color: var(--gris); transition: all 0.15s; }
  .map-mode-btn.active { background: var(--verde); border-color: var(--verde); color: white; }
  #map-div { width: 100%; height: 480px; background: #e5e5e5; border-radius: 8px; z-index: 1; }
  .map-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--texto-suave); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
